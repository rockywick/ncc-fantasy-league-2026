<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IPL Fantasy League</title>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
      :root {
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #6b7280;
        --line: #d9dee7;
        --head: #10233f;
        --head-text: #ffffff;
        --soft: #f1f4f8;
        --error-bg: #fff2f0;
        --error-text: #9f1d12;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        width: min(1200px, calc(100% - 28px));
        margin: 0 auto;
        padding: 28px 0 48px;
      }

      h1 { margin: 0 0 6px; font-size: clamp(30px, 4vw, 44px); }
      h2 { margin: 0 0 14px; font-size: 22px; }

      .updated { color: var(--muted); font-size: 14px; }

      .section {
        margin-top: 18px;
        padding: 16px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .table-wrap {
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 6px;
      }

      table {
        width: 100%;
        min-width: 560px;
        border-collapse: collapse;
        font-size: 14px;
      }

      th, td {
        padding: 9px 10px;
        border-bottom: 1px solid var(--line);
        text-align: center;
        white-space: nowrap;
      }

      th {
        position: sticky;
        top: 0;
        background: var(--head);
        color: var(--head-text);
      }

      .num { text-align: center; font-variant-numeric: tabular-nums; }

      details {
        margin: 10px 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      summary {
        cursor: pointer;
        padding: 12px 14px;
        font-weight: 700;
        display: flex;
        justify-content: space-between;
        gap: 14px;
      }

      details[open] > summary { background: var(--soft); }

      .details-body { padding: 0 12px 12px; }
      .muted { color: var(--muted); font-weight: 400; }
      .past-row { color: #9aa1ad; background: #fafafa; }
      .error { color: var(--error-text); background: var(--error-bg); padding: 10px 12px; border-radius: 6px; }
      .status { color: var(--muted); padding: 8px 0; }
      .search {
        width: min(420px, 100%);
        margin: 0 0 12px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        font: inherit;
        text-align: center;
      }

      @media (max-width: 700px) {
        main { width: min(100% - 18px, 1200px); padding-top: 18px; }
        .section { padding: 12px; }
        summary { display: block; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>IPL Fantasy League</h1>
        <div class="updated">Last updated: <span id="lastUpdated">manual update</span></div>
      </header>

      <section class="section">
        <h2>Leaderboard</h2>
        <div id="leaderboard"></div>
      </section>

      <section class="section">
        <h2>Points</h2>
        <div id="ownerPoints"></div>
      </section>

      <section class="section">
        <h2>Matches</h2>
        <div id="matches"></div>
      </section>

      <section class="section">
        <h2>Player Breakdown</h2>
        <input id="playerBreakdownSearch" class="search" type="search" placeholder="Search player name" aria-label="Search player name">
        <div id="playerBreakdown"></div>
      </section>
    </main>

    <script>
      const files = {
        summary: 'data/owner_points_summary.csv',
        ownerPlayers: 'data/owner_player_points.csv',
        matches: 'data/matches.csv',
        matchDetails: 'data/match_owner_player_points.csv',
        playerBreakdown: 'data/player_points_breakdown.csv',
        updated: 'data/last_updated.txt'
      };

      const state = { summary: [], ownerPlayers: [], matches: [], matchDetails: [], playerBreakdown: [] };

      function num(value) {
        const parsed = Number(value);
        return Number.isFinite(parsed) ? parsed : 0;
      }

      function fmt(value) {
        return num(value).toLocaleString(undefined, { maximumFractionDigits: 1 });
      }

      function loadCsv(path) {
        return new Promise((resolve, reject) => {
          Papa.parse(path, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: (result) => result.errors.length ? reject(new Error(result.errors[0].message)) : resolve(result.data),
            error: reject
          });
        });
      }

      function byOwnerRank() {
        return [...state.summary].sort((a, b) => num(b.total_points) - num(a.total_points));
      }

      function groupBy(rows, key) {
        const groups = new Map();
        rows.forEach((row) => {
          const value = row[key];
          if (!groups.has(value)) groups.set(value, []);
          groups.get(value).push(row);
        });
        return groups;
      }

      function table(headers, rows, rowClass) {
        if (!rows.length) return '<div class="status">No rows yet.</div>';
        const head = headers.map((h) => `<th>${h.label}</th>`).join('');
        const body = rows.map((row) => {
          const cls = rowClass ? rowClass(row) : '';
          const cells = headers.map((h) => {
            const value = h.format ? h.format(row[h.key], row) : row[h.key];
            return `<td class="${h.num ? 'num' : ''}">${value ?? ''}</td>`;
          }).join('');
          return `<tr class="${cls}">${cells}</tr>`;
        }).join('');
        return `<div class="table-wrap"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
      }

      function renderLeaderboard() {
        const rows = byOwnerRank().map((row, index) => ({
          rank: index + 1,
          owner_name: row.owner_name,
          total_points: row.total_points
        }));
        document.getElementById('leaderboard').innerHTML = table([
          { label: 'Rank', key: 'rank', num: true },
          { label: 'Owner', key: 'owner_name' },
          { label: 'Total Points', key: 'total_points', num: true, format: fmt }
        ], rows);
      }

      function renderOwnerPoints() {
        const byOwner = groupBy(state.ownerPlayers, 'owner_name');
        const html = byOwnerRank().map((ownerRow, index) => {
          const rows = byOwner.get(ownerRow.owner_name) || [];
          rows.sort((a, b) => (a.status === b.status ? num(b.total_points) - num(a.total_points) : a.status === 'current' ? -1 : 1));
          return `
            <details ${index === 0 ? 'open' : ''}>
              <summary><span>${ownerRow.owner_name}</span><span>${fmt(ownerRow.total_points)} pts</span></summary>
              <div class="details-body">
                ${table([
                  { label: 'Player', key: 'player_name' },
                  { label: 'Total', key: 'total_points', num: true, format: fmt },
                  { label: 'First Half', key: 'phase1_points_G1_to_G7', num: true, format: fmt },
                  { label: 'After Trade', key: 'phase2_points_G8_to_end', num: true, format: fmt }
                ], rows, (row) => row.status === 'past' ? 'past-row' : '')}
                <div class="status">Grey rows are first-half players who are not in the current roster.</div>
              </div>
            </details>
          `;
        }).join('');
        document.getElementById('ownerPoints').innerHTML = html || '<div class="status">No owner player data found.</div>';
      }

      function renderMatches() {
        const detailByMatch = groupBy(state.matchDetails, 'match_id');
        const ownersByRank = byOwnerRank().map((row) => row.owner_name);
        const html = state.matches.map((match) => {
          const rows = detailByMatch.get(match.match_id) || [];
          const byOwner = groupBy(rows, 'owner_name');
          const ownerHtml = ownersByRank.map((owner) => {
            const ownerRows = byOwner.get(owner) || [];
            const total = ownerRows.reduce((sum, row) => sum + num(row.points), 0);
            ownerRows.sort((a, b) => num(b.points) - num(a.points));
            return `
              <details>
                <summary><span>${owner}</span><span>${fmt(total)} pts</span></summary>
                <div class="details-body">
                  ${table([
                    { label: 'Player', key: 'player_name' },
                    { label: 'Team', key: 'team_name' },
                    { label: 'Points', key: 'points', num: true, format: fmt }
                  ], ownerRows)}
                </div>
              </details>
            `;
          }).join('');
          return `
            <details>
              <summary><span>${match.match_label}</span><span class="muted">${match.match_date}</span></summary>
              <div class="details-body">${ownerHtml}</div>
            </details>
          `;
        }).join('');
        document.getElementById('matches').innerHTML = html || '<div class="status">No match data found.</div>';
      }

      function renderPlayerBreakdown() {
        const query = document.getElementById('playerBreakdownSearch').value.trim().toLowerCase();
        const rows = state.playerBreakdown
          .filter((row) => !query || String(row.player_name || '').toLowerCase().includes(query))
          .sort((a, b) => num(b.total_points) - num(a.total_points));
        document.getElementById('playerBreakdown').innerHTML = table([
          { label: 'Player', key: 'player_name' },
          { label: 'Team', key: 'team_name' },
          { label: 'Owner', key: 'owner_name' },
          { label: 'Batting', key: 'batting_points', num: true, format: fmt },
          { label: 'Bowling', key: 'bowling_points', num: true, format: fmt },
          { label: 'Fielding', key: 'fielding_points', num: true, format: fmt },
          { label: 'Playing', key: 'playing_points', num: true, format: fmt },
          { label: 'Total', key: 'total_points', num: true, format: fmt }
        ], rows);
      }

      async function loadUpdated() {
        try {
          const response = await fetch(files.updated, { cache: 'no-store' });
          if (response.ok) document.getElementById('lastUpdated').textContent = (await response.text()).trim() || 'manual update';
        } catch (_) {}
      }

      async function init() {
        loadUpdated();
        try {
          [state.summary, state.ownerPlayers, state.matches, state.matchDetails, state.playerBreakdown] = await Promise.all([
            loadCsv(files.summary),
            loadCsv(files.ownerPlayers),
            loadCsv(files.matches),
            loadCsv(files.matchDetails),
            loadCsv(files.playerBreakdown)
          ]);
          renderLeaderboard();
          renderOwnerPoints();
          renderMatches();
          renderPlayerBreakdown();
          document.getElementById('playerBreakdownSearch').addEventListener('input', renderPlayerBreakdown);
        } catch (error) {
          const message = `<div class="error">Could not load site data. Run python3 scripts/build_site.py after generating outputs. ${error.message || error}</div>`;
          document.getElementById('leaderboard').innerHTML = message;
        }
      }

      init();
    </script>
  </body>
</html>
